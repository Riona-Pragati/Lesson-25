<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Webpage – Media Showcase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1, h2 {
            color: #2a4d8f;
        }
        .section {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <h1>Different Forms of Media</h1>
    <p>This page displays different types of media you can add using HTML.</p>

    <!-- Image Section -->
    <div class="section">
        <h2>School Image</h2>
        <img src="image.jpg" width="400">
    </div>

    <!-- Audio Section -->
    <div class="section">
        <audio controls>
            <source src="audio.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <!-- Video Section -->
    <div class="section">
        <video width="500" controls>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
</body>
</html>
